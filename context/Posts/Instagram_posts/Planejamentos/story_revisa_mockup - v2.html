
<html>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;800&display=swap');
  body { margin: 0; background: transparent; font-family: 'Nunito', sans-serif; }
  .phone-wrap {
    display: flex;
    justify-content: center;
    padding: 1rem 0 2rem;
  }
  .phone {
    width: 260px;
    height: 520px;
    background: #EDE8E5;
    border-radius: 28px;
    border: 2px solid #d4cfc9;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    box-sizing: border-box;
  }
  .logo-area {
    position: absolute;
    top: 18px;
    right: 18px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .logo-text {
    color: #07191D;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    font-family: 'Nunito', sans-serif;
  }
  .logo-dot {
    width: 8px;
    height: 5px;
    background: linear-gradient(135deg, #32969B, #5bc4ca);
    border-radius: 50% 50% 0 0;
  }
  .progress-bar {
    position: absolute;
    top: 10px;
    left: 14px;
    right: 14px;
    height: 2px;
    background: rgba(7,25,29,0.15);
    border-radius: 2px;
    display: flex;
    gap: 3px;
  }
  .bar-seg {
    height: 100%;
    border-radius: 2px;
    flex: 1;
    background: rgba(7,25,29,0.2);
  }
  .bar-seg.active {
    background: #07191D;
  }
  .content {
    width: 100%;
    text-align: left;
  }
  .label {
    font-size: 9px;
    font-weight: 300;
    color: #32969B;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-family: 'Nunito', sans-serif;
  }
  .main-text {
    font-size: 20px;
    font-weight: 800;
    color: #07191D;
    line-height: 1.3;
    margin-bottom: 10px;
    font-family: 'Nunito', sans-serif;
  }
  .sub-text {
    font-size: 13px;
    font-weight: 400;
    color: rgba(7,25,29,0.6);
    line-height: 1.5;
    font-family: 'Nunito', sans-serif;
  }
  .cta-btn {
    position: absolute;
    bottom: 24px;
    left: 20px;
    right: 20px;
    background: #32969B;
    color: #FAFAFA;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 0;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
  }
  .divider {
    width: 32px;
    height: 2px;
    background: #32969B;
    border-radius: 2px;
    margin: 14px 0;
  }
  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .tab {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.15s;
  }
  .tab.active {
    background: #07191D;
    color: #FAFAFA;
    border-color: #07191D;
  }
  .caption {
    text-align: center;
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 10px;
    font-family: var(--font-sans);
  }
</style>

<div class="tabs">
  <div class="tab active" onclick="show(0, this)">Story 1</div>
  <div class="tab" onclick="show(1, this)">Story 2</div>
  <div class="tab" onclick="show(2, this)">Story 3</div>
  <div class="tab" onclick="show(3, this)">Story 4</div>
</div>

<div class="phone-wrap">
  <div class="phone" id="phone">

    <div class="progress-bar">
      <div class="bar-seg active" id="s0"></div>
      <div class="bar-seg" id="s1"></div>
      <div class="bar-seg" id="s2"></div>
      <div class="bar-seg" id="s3"></div>
    </div>

    <div class="logo-area">
      <div class="logo-dot"></div>
      <span class="logo-text">revisa</span>
    </div>

    <div class="content" id="story-content">
      <div class="label">Story 1 · Reforço da dor</div>
      <div class="main-text">Você achou que estava tudo certo na saída da empresa.</div>
      <div class="divider"></div>
      <div class="sub-text">Talvez estivesse. Mas <span style="color:#32969B;font-weight:700">vale checar.</span></div>
    </div>

    <div class="cta-btn" id="cta-btn">Falar com especialista</div>
  </div>
</div>

<div class="caption" id="caption">Fundo Off-White Quente · Texto Dark Navy · Destaque em Teal · Fonte Nunito</div>

<script>
const stories = [
  {
    label: "Story 1 · Reforço da dor",
    main: 'Você achou que estava tudo certo na saída da empresa.',
    sub: 'Talvez estivesse. Mas <span style="color:#32969B;font-weight:700">vale checar.</span>',
    cta: "Falar com especialista",
    caption: "Fundo Off-White Quente · Texto Dark Navy · Destaque em Teal · Fonte Nunito"
  },
  {
    label: "Story 2 · Autoridade por empresa",
    main: '<span style="color:#32969B">Unilever · Coca-Cola<br>Nestlé · PepsiCo<br>Danone · J&J</span>',
    sub: 'Cada empresa tem padrões diferentes. A revisão precisa ser feita por quem conhece.',
    cta: "Agendar análise",
    caption: "Empresas em Teal · Texto corrido em Dark Navy · Fundo Off-White Quente"
  },
  {
    label: "Story 3 · Quebra de objeção",
    main: 'Revisar não é brigar.',
    sub: 'A análise é <span style="color:#32969B;font-weight:700">sigilosa</span>, gratuita e sem compromisso. Você decide o próximo passo depois de entender o seu caso.',
    cta: "Agendar 10 minutos",
    caption: "Palavra-chave em Teal · Tom consultivo · Botão CTA Teal"
  },
  {
    label: "Story 4 · Urgência legítima",
    main: 'A lei permite revisar os últimos <span style="color:#32969B">5 anos.</span>',
    sub: 'Cada mês que passa, uma parte fica de fora. Não é pressão — é o <span style="color:#32969B;font-weight:700">prazo legal.</span>',
    cta: "Falar com especialista",
    caption: "Urgência baseada em dado real · Sem agressividade · CTA direto"
  }
];

function show(i, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.bar-seg').forEach((s, idx) => {
    s.classList.toggle('active', idx === i);
  });
  const s = stories[i];
  document.querySelector('.label').textContent = s.label;
  document.querySelector('.main-text').innerHTML = s.main;
  document.querySelector('.sub-text').innerHTML = s.sub;
  document.getElementById('cta-btn').textContent = s.cta;
  document.getElementById('caption').textContent = s.caption;
}
</script>
</html>
